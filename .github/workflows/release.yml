name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          tag="${{ steps.latest_tag.outputs.tag }}"
          version="${tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          # Check commit messages since last tag for bump keywords
          commits=$(git log "${tag}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$commits" | grep -qi '\[major\]'; then
            major=$((major + 1))
            minor=0
            patch=0
          elif echo "$commits" | grep -qi '\[minor\]'; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          new_version="v${major}.${minor}.${patch}"
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.bump.outputs.version }}"
          git tag "$version"
          git push origin "$version"
          gh release create "$version" --generate-notes --title "$version"
